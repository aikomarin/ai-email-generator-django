<!DOCTYPE html>
<html>
<head>
    <title>Generador de Correos</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
        }

        select, button {
            padding: 8px;
            margin-top: 10px;
        }

        .resultado {
            margin-top: 20px;
            background: #eef;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Generador de Correos con IA</h2>

    <form method="post">
        {% csrf_token %}

        <label>¿Qué necesitas escribir?</label>
        <textarea name="prompt" required></textarea>

        <label>Tipo de correo:</label>
        <select name="tipo">
            <option value="formal">Formal</option>
            <option value="casual">Casual</option>
            <option value="urgente">Urgente</option>
        </select>

        <br>
        <button type="submit">Generar</button>
    </form>

    {% if resultado %}
        <div class="resultado">
            <strong>Correo generado:</strong>
            <p>{{ resultado }}</p>
        </div>
    {% endif %}
</div>

</body>
</html>
